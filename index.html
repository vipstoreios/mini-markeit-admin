<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mini markeit Admin</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <section id="loginPage" class="login-page">
    <div class="login-card">
      <div class="brand-row center-brand">
        <div class="brand-icon"><i data-lucide="shopping-bag"></i></div>
        <div>
          <h1>Mini markeit</h1>
          <p>مینی مارکێت - داشبۆردی ئەدمین</p>
        </div>
      </div>
      <h2>چوونەژوورەوە</h2>
      <p class="muted">تەنها ئەدمین دەتوانێت بەشەکان بگۆڕێت، زیاد بکات و بسڕێتەوە.</p>
      <label>ناوی بەکارهێنەر</label>
      <input id="usernameInput" value="admin" autocomplete="username" />
      <label>پاسۆرد</label>
      <input id="passwordInput" type="password" value="12345678" autocomplete="current-password" />
      <button class="btn primary full" onclick="login()">چوونەژوورەوە</button>
      <p id="loginError" class="error"></p>
    </div>
  </section>

  <section id="app" class="app hidden">
    <aside id="sidebar" class="sidebar">
      <div class="brand-row sidebar-brand">
        <div class="brand-icon"><i data-lucide="shopping-bag"></i></div>
        <div>
          <h1>Mini markeit</h1>
          <p>مینی مارکێت</p>
        </div>
      </div>
      <nav id="nav" class="nav"></nav>
      <div class="support-box"><i data-lucide="headphones"></i><span>پشتیوانی<br><small>24/7 چات یان واتسئاپ</small></span></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="icon-btn mobile-only" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
        <div class="search"><i data-lucide="search"></i><input id="searchInput" oninput="searchCurrentPage()" placeholder="گەڕان..." /></div>
        <button class="btn ghost desktop-only" onclick="seedDemo()"><i data-lucide="sparkles"></i> تاقیکردنەوە</button>
        <button class="btn ghost" onclick="logout()"><i data-lucide="log-out"></i> دەرچوون</button>
      </header>
      <section id="page" class="page"></section>
    </main>
  </section>

  <div id="modal" class="modal hidden"></div>
  <script src="script.js"></script>
</body>
</html>
